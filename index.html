<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Missão 💖</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<audio id="som-acerto" src="acerto.mp3"></audio>
<audio id="som-erro" src="erro.mp3"></audio>
<canvas id="hearts"></canvas>

<div id="login">
  <div class="card">
    <h2>🔐 Área secreta</h2>
    <p>Digite a senha para começar</p>
    <input id="senha" placeholder="Senha..." />
    <button onclick="entrar()">Entrar</button>
    <p id="erro"></p>
  </div>
</div>

<div id="app" style="display:none;">
  <!-- seu app continua aqui -->
  <div class="container">
  
    <div class="card">
      <div class="topo">
        <span id="fase-info">Fase 1 de 4</span>
        <div class="barra">
          <div id="progresso"></div>
        </div>
      </div>
  
      <h1 id="titulo">💌 Missão especial</h1>
      <p id="pergunta"></p>
  
      <input id="resposta" placeholder="Digite aqui..." />
      <button onclick="verificar()">Responder</button>
  
      <p id="feedback"></p>
    </div>
  
  </div>
</div>


<script src="script.js"></script>
</body>
</html>
